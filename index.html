<!DOCTYPE html>

<head>

    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="menu">
        <div class="dashboard">
            <div class="img-big"></div>
            <h1 class="left-title">Dashboard</h1>
        </div>
        <div class="sectionss">
            <div class="section">

            <div class="section">
                <div class="img"></div>
                <p class="left-para">Messages</p>
            </div>

                <p class="left-para">Tasks</p>
            </div>
            <div class="section">
                <div class="img"></div>
                <p class="left-para">Communities</p>
            </div>

            <div class="option">

        <div>
            <p class="right-para">Hi there,</p>
            <p class="profile-name">Cisca (@cisca)</p>

        <div class="action">
            <button>New</button>
        </div>
        <div class="action">
            <button>Upload</button>
        </div>
        <div class="action">
            <button>Share</button>
        </div>

    <div class="content">

    </div>
    <div class="news">

</html>
